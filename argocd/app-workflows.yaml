# argocd/app-workflows.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows-definitions
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/serhioms/platform-gitops.git
    targetRevision: main
    path: workflows
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
